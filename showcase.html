<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showcase – ArtHome 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

    <header class="sticky top-0 z-20 bg-white/95 backdrop-blur border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center gap-4">
            <a href="index.html" class="flex items-center gap-2 text-blue-600 hover:text-blue-700 font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                Back to Year in Review
            </a>
            <h1 id="showcase-title" class="text-lg font-bold text-gray-900 truncate flex-1 text-center"></h1>
            <span class="w-24"></span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-8">
        <p id="showcase-date" class="text-sm text-gray-500 mb-6 text-center"></p>
        <div id="showcase-gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        <p id="showcase-empty" class="text-center text-gray-500 py-12 hidden">No photos in this showcase yet.</p>
    </main>

    <!-- Full-screen lightbox for photo/video -->
    <div id="lightbox" class="fixed inset-0 z-50 bg-black/95 hidden flex-col items-center justify-center p-4" role="dialog" aria-modal="true" aria-label="Media viewer">
        <button id="lightbox-close" type="button" class="absolute top-4 right-4 z-10 p-2 rounded-full bg-white/10 text-white hover:bg-white/20 transition-colors" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <div id="lightbox-content" class="relative w-full h-full max-w-6xl max-h-[90vh] flex items-center justify-center"></div>
    </div>

    <script>
        const showcaseData = {
          'class-a': { title: 'Class A Memories', date: '2025–2026', images: ['https://picsum.photos/seed/classa1/800/600', 'https://picsum.photos/seed/classa2/800/600', 'https://picsum.photos/seed/classa3/800/600'] },
          'class-b': { title: 'Class B Memories', date: '2025–2026', images: ['https://picsum.photos/seed/classb1/800/600', 'https://picsum.photos/seed/classb2/800/600', 'https://picsum.photos/seed/classb3/800/600'] },
          'class-c': { title: 'Class C Memories', date: '2025–2026', images: ['https://picsum.photos/seed/classc1/800/600', 'https://picsum.photos/seed/classc2/800/600', 'https://picsum.photos/seed/classc3/800/600'] },
          'class-d': { title: 'Class D Memories', date: '2025–2026', images: ['https://picsum.photos/seed/classd1/800/600', 'https://picsum.photos/seed/classd2/800/600', 'https://picsum.photos/seed/classd3/800/600'] },
          'class-e': { title: 'Class E Memories', date: '2025–2026', images: ['https://picsum.photos/seed/classe1/800/600', 'https://picsum.photos/seed/classe2/800/600', 'https://picsum.photos/seed/classe3/800/600'] },
          'class-f': { title: 'Class F Memories', date: '2025–2026', images: ['https://picsum.photos/seed/classf1/800/600', 'https://picsum.photos/seed/classf2/800/600', 'https://picsum.photos/seed/classf3/800/600'] },
          'arthome-in-a-year': { title: 'Arthome in a Year', date: '2025–2026', images: ['https://picsum.photos/seed/arthome1/800/600', 'https://picsum.photos/seed/arthome2/800/600', 'https://picsum.photos/seed/arthome3/800/600'] },
          'life-at-arthome': { title: 'Life at Arthome', date: '2025–2026', images: ['https://picsum.photos/seed/life1/800/600', 'https://picsum.photos/seed/life2/800/600', 'https://picsum.photos/seed/life3/800/600'] },
          'teachers-at-arthome': { title: 'Teachers at ArtHome', date: '2025–2026', images: ['https://picsum.photos/seed/teachers1/800/600', 'https://picsum.photos/seed/teachers2/800/600', 'https://picsum.photos/seed/teachers3/800/600'] },
        };

        const params = new URLSearchParams(window.location.search);
        const galleryId = params.get('gallery') || '';
        const data = showcaseData[galleryId];

        const titleEl = document.getElementById('showcase-title');
        const dateEl = document.getElementById('showcase-date');
        const galleryEl = document.getElementById('showcase-gallery');
        const emptyEl = document.getElementById('showcase-empty');
        const lightbox = document.getElementById('lightbox');
        const lightboxContent = document.getElementById('lightbox-content');
        const lightboxClose = document.getElementById('lightbox-close');

        function isVideoUrl(url) {
          if (typeof url !== 'string') return false;
          const u = url.split('?')[0].toLowerCase();
          return /\.(mp4|webm|ogg|mov)(\?|$)/.test(u);
        }

        function normalizeMediaItems(raw) {
          if (!raw || !raw.length) return [];
          const list = raw.images || raw.media || raw;
          return list.map((item) => {
            if (typeof item === 'string') {
              return { type: isVideoUrl(item) ? 'video' : 'image', url: item };
            }
            return { type: item.type || 'image', url: item.url || item.src };
          });
        }

        function openLightbox(media) {
          lightboxContent.innerHTML = '';
          lightbox.classList.remove('hidden');
          lightbox.classList.add('flex');
          document.body.style.overflow = 'hidden';

          if (media.type === 'video') {
            const video = document.createElement('video');
            video.src = media.url;
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            video.className = 'max-w-full max-h-[90vh] w-full object-contain';
            lightboxContent.appendChild(video);
          } else {
            const img = document.createElement('img');
            img.src = media.url;
            img.alt = data ? data.title : 'Photo';
            img.className = 'max-w-full max-h-[90vh] w-auto object-contain';
            lightboxContent.appendChild(img);
          }
        }

        function closeLightbox() {
          const video = lightboxContent.querySelector('video');
          if (video) {
            video.pause();
            video.removeAttribute('src');
          }
          lightbox.classList.add('hidden');
          lightbox.classList.remove('flex');
          document.body.style.overflow = '';
          lightboxContent.innerHTML = '';
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

        if (data) {
          document.title = data.title + ' – ArtHome 2026';
          titleEl.textContent = data.title;
          dateEl.textContent = data.date;
          const items = normalizeMediaItems(data);
          if (items.length) {
            items.forEach((media, i) => {
              const isVideo = media.type === 'video';
              const button = document.createElement('button');
              button.type = 'button';
              button.className = 'block rounded-xl overflow-hidden bg-gray-100 aspect-[4/3] hover:ring-2 hover:ring-blue-400 transition-all text-left focus:outline-none focus:ring-2 focus:ring-blue-400';
              if (isVideo) {
                button.innerHTML = `
                  <video src="${media.url}" class="w-full h-full object-cover pointer-events-none" muted preload="metadata"></video>
                  <span class="absolute inset-0 flex items-center justify-center bg-black/30 pointer-events-none">
                    <span class="w-14 h-14 rounded-full bg-white/90 flex items-center justify-center">
                      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-600 ml-1" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </span>
                  </span>
                `;
                button.style.position = 'relative';
              } else {
                button.innerHTML = `<img src="${media.url}" alt="${data.title} ${i + 1}" class="w-full h-full object-cover" loading="lazy" />`;
              }
              button.addEventListener('click', () => openLightbox(media));
              galleryEl.appendChild(button);
            });
          } else {
            emptyEl.classList.remove('hidden');
          }
        } else {
          document.title = 'Showcase – ArtHome 2026';
          titleEl.textContent = 'Showcase';
          emptyEl.textContent = 'Gallery not found.';
          emptyEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
