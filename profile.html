<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile – ArtHome 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

    <header class="sticky top-0 z-20 bg-white/95 backdrop-blur border-b border-gray-100">
        <div class="max-w-2xl mx-auto px-6 py-4 flex items-center gap-4">
            <a href="index.html" class="flex items-center gap-2 text-blue-600 hover:text-blue-700 font-medium shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                Back
            </a>
            <h1 id="profile-name" class="text-lg font-bold text-gray-900 truncate flex-1 text-center"></h1>
            <span class="w-12"></span>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-8">
        <p id="profile-section" class="text-sm text-gray-500 mb-6 text-center"></p>

        <!-- Profile card: profile photo + formal attire -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-10">
            <div class="p-4 pb-2">
                <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider text-center mb-4">Profile</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="text-center">
                        <p class="text-xs font-medium text-gray-500 mb-2">Profile Photo</p>
                        <div class="aspect-square rounded-xl overflow-hidden bg-gray-100">
                            <img id="profile-photo" src="" alt="Profile" class="w-full h-full object-cover object-[center_25%]" onerror="this.onerror=null;this.src='https://picsum.photos/seed/fallback/400/400';" />
                        </div>
                    </div>
                    <div class="text-center">
                        <p class="text-xs font-medium text-gray-500 mb-2">Formal Attire</p>
                        <div class="aspect-square rounded-xl overflow-hidden bg-gray-100">
                            <img id="profile-formal" src="" alt="Formal attire" class="w-full h-full object-cover object-[center_25%]" onerror="this.onerror=null;this.src='https://picsum.photos/seed/fallback/400/400';" />
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Artworks gallery -->
        <div>
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider text-center mb-4">Artworks (digital)</h2>
            <div id="profile-artworks" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
            <p id="profile-no-artworks" class="text-center text-gray-500 py-8 hidden">No artworks yet.</p>
        </div>
    </main>

    <div id="lightbox" class="fixed inset-0 z-50 bg-black/95 hidden flex-col items-center justify-center p-4" role="dialog" aria-modal="true">
        <button id="lightbox-close" type="button" class="absolute top-4 right-4 z-10 p-2 rounded-full bg-white/10 text-white hover:bg-white/20" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <div id="lightbox-content" class="relative w-full h-full max-w-4xl max-h-[90vh] flex items-center justify-center"></div>
    </div>

    <script>
        const driveImageUrl = (id) => `https://lh3.googleusercontent.com/u/0/d/${id}=w1000`;

        const kindergartenNames = [
          'Alquizar, Braxton Quinn B.', 'Camarista, Lia Isabelle L.', 'Dela Cruz, Mervin Jr. D.', 'Denila, Ashiana Ysabelle Y.', 'Dulaugon, Elisha Faith H.',
          'Evangelista, Tara Kaisley S.', 'Gabo, Zheanne Nathanielle T.', 'Gamueta, Carisza Maureen M.', 'Gialon, Eonah Iris Saoirse R.', 'Lopez, Nathania Erised F.',
          'Maghamil, Jen Myrrh L.', 'Mahinay, Astrid Nathania T.', 'Mallorca, Bren Christoffe A.', 'Manlupig, Andrea Jurez C.', 'Mansueto, Denise Zephora A.',
          'Marilla, Pat Destiny P.', 'Masong, Aiah B.', 'Miralles, Arthemis Thoby N.', 'Pahoyo, Zhea May T.', 'Panla-an, Jan Mars L.', 'Pañer, Krysthea Hera',
          'Potoy, Magnus Gaven M.', 'Potoy, Theophilus M.', 'Quijote, Kelly Thaddia M.', 'Redito, Rigel Moon Aries K.', 'Salarda, Teomasio Joeleb', 'Silagan, Adih Feign C.', 'Vicente, Kristiana J.',
        ];
        const kindergartenCompleters = kindergartenNames.map((name) => {
          const seed = encodeURIComponent(name.toLowerCase().replace(/[^\p{L}\p{N}]+/gu, '-').replace(/-+/g, '-').replace(/(^-|-$)/g, ''));
          const avatar = `https://api.dicebear.com/9.x/adventurer/svg?seed=${seed}`;
          const photos = [`https://picsum.photos/seed/grad-${seed}-1/1200/800`, `https://picsum.photos/seed/grad-${seed}-2/800/1200`, `https://picsum.photos/seed/grad-${seed}-3/1000/1000`];
          return { name, sectionTitle: 'Kindergarten Completers', profilePhoto: avatar, formalAttire: photos[0] || avatar, artworks: photos };
        });

        const grade6Completers = [
          { name: 'Amores, Darielle Keisler B.', photoId: '1fEaV4uJlK5tCgOaX5dD4E8lM412PFbii' },
          { name: 'Caspillo, Kenth Victor D.', photoId: '1wRPGpRpqwbcnm10DCKrt3UaJsKfxvsZa' },
          { name: 'Estilo, Prince Genovie B.', photoId: '1q15vP7hyvddR29dXHQjBpnm69u7mJcpo' },
          { name: 'Flores, Mc Hene V.', photoId: '1pexk97MpEz3y1ZbWnWscN9X5QvdlWBnk' },
          { name: 'Narciso, Tala B.', photoId: '1jjHlwm_EjkHKeF6rghz0KrBO0PVSeMeD' },
          { name: 'Villa, Todd Ozwald G.', photoId: '1EUvhkml2RQ-w40IdD1FMsqqT0YtJp74i' },
        ].map(({ name, photoId }) => {
          const src = driveImageUrl(photoId);
          return { name, sectionTitle: 'Grade 6 Completers', profilePhoto: src, formalAttire: src, artworks: [src] };
        });

        const params = new URLSearchParams(window.location.search);
        const section = params.get('completer') || '';
        const id = parseInt(params.get('id'), 10);
        let profile;
        if (section === 'kindergarten' && !isNaN(id) && kindergartenCompleters[id]) {
          profile = kindergartenCompleters[id];
        } else if (section === 'grade6' && !isNaN(id) && grade6Completers[id]) {
          profile = grade6Completers[id];
        } else {
          profile = null;
        }

        const nameEl = document.getElementById('profile-name');
        const sectionEl = document.getElementById('profile-section');
        const profilePhotoEl = document.getElementById('profile-photo');
        const profileFormalEl = document.getElementById('profile-formal');
        const artworksEl = document.getElementById('profile-artworks');
        const noArtworksEl = document.getElementById('profile-no-artworks');
        const lightbox = document.getElementById('lightbox');
        const lightboxContent = document.getElementById('lightbox-content');
        const lightboxClose = document.getElementById('lightbox-close');

        function openLightbox(src) {
          lightboxContent.innerHTML = '';
          const img = document.createElement('img');
          img.src = src;
          img.alt = 'Artwork';
          img.className = 'max-w-full max-h-[90vh] w-auto object-contain';
          img.onerror = function() { this.onerror = null; this.src = 'https://picsum.photos/seed/fallback/400/400'; };
          lightboxContent.appendChild(img);
          lightbox.classList.remove('hidden');
          lightbox.classList.add('flex');
          document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
          lightbox.classList.add('hidden');
          lightbox.classList.remove('flex');
          document.body.style.overflow = '';
          lightboxContent.innerHTML = '';
        }
        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

        if (profile) {
          document.title = profile.name + ' – ArtHome 2026';
          nameEl.textContent = profile.name;
          sectionEl.textContent = profile.sectionTitle;
          profilePhotoEl.src = profile.profilePhoto;
          profileFormalEl.src = profile.formalAttire;

          if (profile.artworks && profile.artworks.length) {
            profile.artworks.forEach((src) => {
              const btn = document.createElement('button');
              btn.type = 'button';
              btn.className = 'block rounded-xl overflow-hidden bg-gray-100 aspect-square hover:ring-2 hover:ring-blue-400 transition-all';
              btn.innerHTML = `<img src="${src}" alt="Artwork" class="w-full h-full object-cover" loading="lazy" onerror="this.onerror=null;this.src='https://picsum.photos/seed/fallback/400/400';" />`;
              btn.addEventListener('click', () => openLightbox(src));
              artworksEl.appendChild(btn);
            });
          } else {
            noArtworksEl.classList.remove('hidden');
          }
        } else {
          document.title = 'Profile – ArtHome 2026';
          nameEl.textContent = 'Profile';
          noArtworksEl.textContent = 'Profile not found.';
          noArtworksEl.classList.remove('hidden');
        }
    </script>
</body>
</html>
